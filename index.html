<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guestbook ✦</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f5f0e8;
      --ink: #1a1208;
      --rust: #b5451b;
      --gold: #c8922a;
      --muted: #8a7f6e;
      --card: #fdfaf4;
      --border: #d9d0be;
    }

    body {
      background-color: var(--cream);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.5;
    }

    .wrapper {
      max-width: 680px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      padding: 3rem 0 2.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2.5rem;
      position: relative;
    }

    header::before {
      content: '✦  ✦  ✦';
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.5em;
      color: var(--gold);
      margin-bottom: 1.2rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 3.8rem);
      font-weight: 700;
      line-height: 1.1;
      color: var(--ink);
    }

    h1 em {
      font-style: italic;
      color: var(--rust);
    }

    .subtitle {
      margin-top: 0.8rem;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* FORM */
    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 2rem 2rem 1.8rem;
      margin-bottom: 2.5rem;
      box-shadow: 3px 3px 0 var(--border);
    }

    .form-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      margin-bottom: 1.4rem;
      color: var(--ink);
    }

    .field {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    input, textarea {
      width: 100%;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 1px;
      padding: 0.65rem 0.9rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--ink);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      resize: vertical;
    }

    input:focus, textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(200, 146, 42, 0.12);
    }

    textarea { min-height: 90px; }

    .char-count {
      font-size: 0.62rem;
      color: var(--muted);
      text-align: right;
      margin-top: 0.3rem;
    }

    button[type="submit"] {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1.2rem;
      background: var(--ink);
      color: var(--cream);
      border: none;
      padding: 0.75rem 1.6rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 1px;
      transition: background 0.2s, transform 0.1s;
    }

    button[type="submit"]:hover { background: var(--rust); }
    button[type="submit"]:active { transform: translateY(1px); }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      width: 12px; height: 12px;
      border: 2px solid rgba(245,240,232,0.4);
      border-top-color: var(--cream);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    .loading .spinner { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      font-size: 0.75rem;
      padding: 0.5rem 0.8rem;
      border-radius: 1px;
      margin-top: 0.8rem;
      display: none;
    }
    .toast.success { background: #eef6ee; color: #2d6a2d; border: 1px solid #b5d6b5; display: block; }
    .toast.error { background: #fdf0ed; color: #9b2b1c; border: 1px solid #f0b8ad; display: block; }

    /* ENTRIES */
    .entries-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.2rem;
    }

    .entries-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
    }

    .count-badge {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .live-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4caf50;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #entries-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .entry-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 1.2rem 1.4rem;
      position: relative;
      animation: fadeSlide 0.4s ease both;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .entry-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 0.45rem;
    }

    .entry-message {
      font-size: 0.82rem;
      line-height: 1.65;
      color: #3a3022;
    }

    .entry-time {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-top: 0.8rem;
    }

    .entry-ornament {
      position: absolute;
      top: 1rem; right: 1.2rem;
      font-size: 0.75rem;
      color: var(--gold);
      opacity: 0.5;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }
    .empty-state .big { font-size: 2.5rem; margin-bottom: 0.8rem; }
    .empty-state p { font-size: 0.78rem; }

    .loading-state {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.05em;
    }

    footer {
      text-align: center;
      margin-top: 4rem;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    footer a { color: var(--gold); text-decoration: none; }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <h1>The <em>Guestbook</em></h1>
    <p class="subtitle">Leave a note for the world to see</p>
  </header>

  <!-- Form -->
  <div class="form-card">
    <h2>Write an entry</h2>
    <div class="field">
      <label for="name">Your name</label>
      <input type="text" id="name" placeholder="e.g. Ada Lovelace" maxlength="60" autocomplete="off" />
    </div>
    <div class="field">
      <label for="message">Your message</label>
      <textarea id="message" placeholder="Say something kind, curious, or memorable…" maxlength="300"></textarea>
      <div class="char-count"><span id="char-num">0</span> / 300</div>
    </div>
    <button type="submit" id="submit-btn">
      <span class="spinner"></span>
      <span id="btn-text">Sign the book</span>
    </button>
    <div class="toast" id="toast"></div>
  </div>

  <!-- Entries -->
  <div class="entries-header">
    <h2>Entries</h2>
    <span class="count-badge"><span class="live-dot"></span>Live · <span id="entry-count">—</span> notes</span>
  </div>

  <div id="entries-list">
    <div class="loading-state">Loading entries…</div>
  </div>

  <footer>
    Built with ✦ Supabase &amp; hosted on GitHub Pages
  </footer>
</div>

<!-- Supabase JS v2 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/supabase/2.50.0/supabase.min.js"></script>
<script>
  const SUPABASE_URL = 'https://cwvjswcqxsdhsbbbhpyo.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3dmpzd2NxeHNkaHNiYmJocHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjg1OTAsImV4cCI6MjA4ODc0NDU5MH0.L7vQpgdJNwQTbURUx8TfHVxJuOs47NvdNUdwLca_Ynk';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const nameEl    = document.getElementById('name');
  const msgEl     = document.getElementById('message');
  const submitBtn = document.getElementById('submit-btn');
  const btnText   = document.getElementById('btn-text');
  const toast     = document.getElementById('toast');
  const list      = document.getElementById('entries-list');
  const countEl   = document.getElementById('entry-count');
  const charNum   = document.getElementById('char-num');

  msgEl.addEventListener('input', () => {
    charNum.textContent = msgEl.value.length;
  });

  const ornaments = ['✦', '◆', '❧', '✿', '◈', '※', '✤'];
  function randomOrnament() {
    return ornaments[Math.floor(Math.random() * ornaments.length)];
  }

  function timeAgo(dateStr) {
    const now = new Date();
    const then = new Date(dateStr);
    const diff = Math.floor((now - then) / 1000);
    if (diff < 60)   return 'just now';
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return then.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  }

  function renderEntry(entry, prepend = false) {
    const card = document.createElement('div');
    card.className = 'entry-card';
    card.dataset.id = entry.id;
    card.innerHTML = `
      <span class="entry-ornament">${randomOrnament()}</span>
      <div class="entry-name">${escHtml(entry.name)}</div>
      <div class="entry-message">${escHtml(entry.message)}</div>
      <div class="entry-time">${timeAgo(entry.created_at)}</div>
    `;
    if (prepend) {
      list.insertBefore(card, list.firstChild);
    } else {
      list.appendChild(card);
    }
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg, type) {
    toast.textContent = msg;
    toast.className = `toast ${type}`;
    setTimeout(() => { toast.className = 'toast'; }, 4000);
  }

  async function loadEntries() {
    const { data, error } = await sb
      .from('guestbook')
      .select('*')
      .order('created_at', { ascending: false })
      .limit(50);

    list.innerHTML = '';

    if (error) {
      list.innerHTML = `<div class="empty-state"><p>Could not load entries.</p></div>`;
      return;
    }

    countEl.textContent = data.length;

    if (data.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="big">✦</div>
          <p>No entries yet — be the first to sign!</p>
        </div>`;
      return;
    }

    data.forEach(e => renderEntry(e, false));
  }

  // Realtime subscription
  sb.channel('guestbook-changes')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'guestbook' }, payload => {
      const emptyState = list.querySelector('.empty-state');
      if (emptyState) list.innerHTML = '';
      renderEntry(payload.new, true);
      const current = parseInt(countEl.textContent) || 0;
      countEl.textContent = current + 1;
    })
    .subscribe();

  submitBtn.addEventListener('click', async () => {
    const name = nameEl.value.trim();
    const message = msgEl.value.trim();

    if (!name || !message) {
      showToast('Please fill in your name and message.', 'error');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.classList.add('loading');
    btnText.textContent = 'Signing…';

    const { error } = await sb.from('guestbook').insert({ name, message });

    submitBtn.disabled = false;
    submitBtn.classList.remove('loading');
    btnText.textContent = 'Sign the book';

    if (error) {
      showToast('Something went wrong. Please try again.', 'error');
    } else {
      nameEl.value = '';
      msgEl.value = '';
      charNum.textContent = '0';
      showToast('Your entry was added!', 'success');
    }
  });

  // Allow Enter to submit (Shift+Enter = newline)
  nameEl.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); submitBtn.click(); }
  });

  loadEntries();
</script>
</body>
</html>
