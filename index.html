<!DOCTYPE html>
<html lang="en" data-theme="parchment">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Guestbook ✦</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── THEMES ── */
    [data-theme="parchment"] {
      --bg: #f5f0e8; --ink: #1a1208; --rust: #b5451b; --gold: #c8922a;
      --muted: #8a7f6e; --card: #fdfaf4; --border: #d9d0be;
      --avatar-text: #fdfaf4; --pin-bg: #fff8ee; --pin-border: #f0c060;
    }
    [data-theme="dark"] {
      --bg: #141414; --ink: #e8e0d0; --rust: #e8714a; --gold: #d4a845;
      --muted: #7a7060; --card: #1e1c18; --border: #2e2b24;
      --avatar-text: #141414; --pin-bg: #1e1a0e; --pin-border: #6a5010;
    }
    [data-theme="forest"] {
      --bg: #f0f4ee; --ink: #1a2a1a; --rust: #4a7c3f; --gold: #7aaa5a;
      --muted: #6a8060; --card: #f8fbf6; --border: #c8d8c0;
      --avatar-text: #f8fbf6; --pin-bg: #eef8e8; --pin-border: #a0d080;
    }
    [data-theme="ocean"] {
      --bg: #eef2f8; --ink: #0e1e3a; --rust: #2a5aaa; --gold: #4a8adc;
      --muted: #5a7090; --card: #f6f8fc; --border: #c0cce0;
      --avatar-text: #f6f8fc; --pin-bg: #eaf0fc; --pin-border: #90b8f0;
    }
    [data-theme="rose"] {
      --bg: #fdf0f4; --ink: #2a0e18; --rust: #c04060; --gold: #e07090;
      --muted: #906070; --card: #fff6f8; --border: #e8c0cc;
      --avatar-text: #fff6f8; --pin-bg: #fff0f4; --pin-border: #f0a0b8;
    }

    body {
      background: var(--bg); color: var(--ink);
      font-family: 'DM Mono', monospace; min-height: 100vh;
      padding: 2rem 1rem 5rem;
      transition: background 0.3s, color 0.3s;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 999; opacity: 0.4;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
    }

    .wrapper { max-width: 680px; margin: 0 auto; }

    /* TOP BAR */
    .top-bar {
      display: flex; justify-content: flex-end; align-items: center;
      gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap;
    }

    /* THEME SWATCHES */
    .theme-label { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-right: 0.25rem; }
    .swatches { display: flex; gap: 0.35rem; align-items: center; }
    .swatch {
      width: 18px; height: 18px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: transform 0.15s, border-color 0.15s;
    }
    .swatch:hover { transform: scale(1.2); }
    .swatch.active { border-color: var(--ink); transform: scale(1.15); }
    .swatch[data-t="parchment"] { background: #f5f0e8; outline: 1px solid #d9d0be; }
    .swatch[data-t="dark"]      { background: #141414; }
    .swatch[data-t="forest"]    { background: #4a7c3f; }
    .swatch[data-t="ocean"]     { background: #2a5aaa; }
    .swatch[data-t="rose"]      { background: #c04060; }

    /* DARK MODE TOGGLE */
    .dark-toggle {
      display: flex; align-items: center; gap: 0.4rem;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 0.3rem 0.7rem;
      font-size: 0.7rem; color: var(--muted); cursor: pointer;
      transition: all 0.2s; margin-left: 0.5rem;
    }
    .dark-toggle:hover { border-color: var(--gold); color: var(--ink); }
    .toggle-icon { font-size: 0.85rem; }

    /* HEADER */
    header { text-align: center; padding: 2.5rem 0 2rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
    header::before { content: '✦  ✦  ✦'; display: block; font-size: 0.7rem; letter-spacing: 0.5em; color: var(--gold); margin-bottom: 1.2rem; }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.2rem,6vw,3.6rem); font-weight: 700; line-height: 1.1; }
    h1 em { font-style: italic; color: var(--rust); }
    .subtitle { margin-top: 0.8rem; font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }

    /* STATS */
    .stats-bar {
      display: flex; justify-content: center; gap: 2rem;
      margin: 0 0 2rem; padding: 1.2rem;
      border: 1px solid var(--border); background: var(--card); border-radius: 2px;
      transition: background 0.3s, border-color 0.3s;
    }
    .stat { text-align: center; }
    .stat-num { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; color: var(--rust); display: block; }
    .stat-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }

    /* FORM */
    .form-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 2px;
      padding: 2rem 2rem 1.8rem; margin-bottom: 2rem; box-shadow: 3px 3px 0 var(--border);
      transition: background 0.3s, border-color 0.3s;
    }
    .form-card h2 { font-family: 'Playfair Display', serif; font-size: 1.15rem; margin-bottom: 1.4rem; }
    .field { margin-bottom: 1.1rem; }
    label { display: block; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    input, textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 1px;
      padding: 0.65rem 0.9rem; font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--ink);
      transition: border-color 0.2s, box-shadow 0.2s, background 0.3s; outline: none;
    }
    textarea { resize: vertical; min-height: 90px; }
    input:focus, textarea:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(200,146,42,0.12); }

    /* MOOD */
    .mood-picker { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.4rem; }
    .mood-btn {
      background: var(--bg); border: 1px solid var(--border); border-radius: 2px;
      padding: 0.38rem 0.55rem; font-size: 1.1rem; cursor: pointer;
      transition: all 0.15s; line-height: 1;
    }
    .mood-btn:hover { border-color: var(--gold); transform: scale(1.1); }
    .mood-btn.selected { border-color: var(--rust); background: var(--pin-bg); box-shadow: 0 0 0 2px rgba(181,69,27,0.15); transform: scale(1.15); }

    .char-count { font-size: 0.62rem; color: var(--muted); text-align: right; margin-top: 0.3rem; }

    button[type="submit"] {
      display: flex; align-items: center; gap: 0.5rem; margin-top: 1.2rem;
      background: var(--ink); color: var(--bg); border: none; padding: 0.75rem 1.6rem;
      font-family: 'DM Mono', monospace; font-size: 0.78rem; letter-spacing: 0.1em;
      text-transform: uppercase; cursor: pointer; border-radius: 1px; transition: background 0.2s, transform 0.1s;
    }
    button[type="submit"]:hover { background: var(--rust); }
    button[type="submit"]:active { transform: translateY(1px); }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner { width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.3); border-top-color: var(--bg); border-radius: 50%; animation: spin 0.6s linear infinite; display: none; }
    .loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast { font-size: 0.75rem; padding: 0.5rem 0.8rem; border-radius: 1px; margin-top: 0.8rem; display: none; }
    .toast.success { background: #eef6ee; color: #2d6a2d; border: 1px solid #b5d6b5; display: block; }
    .toast.error   { background: #fdf0ed; color: #9b2b1c; border: 1px solid #f0b8ad; display: block; }

    /* ENTRIES CONTROLS */
    .entries-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; gap: 1rem; flex-wrap: wrap; }
    .entries-header h2 { font-family: 'Playfair Display', serif; font-size: 1.3rem; }
    .count-badge { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
    .live-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #4caf50; margin-right: 5px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .search-bar { width: 100%; margin-bottom: 1rem; position: relative; }
    .search-bar input { padding-left: 2.2rem; font-size: 0.8rem; }
    .search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.9rem; pointer-events: none; }

    .sort-tabs { display: flex; gap: 0.4rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
    .sort-tab {
      font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 0.35rem 0.75rem; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer; border-radius: 1px; transition: all 0.15s;
    }
    .sort-tab:hover { border-color: var(--gold); color: var(--ink); }
    .sort-tab.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

    /* ENTRY CARDS */
    #entries-list { display: flex; flex-direction: column; gap: 1rem; }

    .entry-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 2px;
      padding: 1.2rem 1.4rem 1rem; position: relative;
      animation: fadeSlide 0.4s ease both; transition: box-shadow 0.2s, background 0.3s, border-color 0.3s;
    }
    .entry-card:hover { box-shadow: 3px 3px 0 var(--border); }
    .entry-card.pinned-card {
      border-color: var(--pin-border); background: var(--pin-bg);
      box-shadow: 3px 3px 0 var(--pin-border);
    }

    @keyframes fadeSlide { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }

    .pin-banner {
      font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 0.7rem; display: flex; align-items: center; gap: 0.3rem;
    }

    .entry-top { display: flex; align-items: flex-start; gap: 0.75rem; margin-bottom: 0.5rem; }

    /* AVATAR */
    .avatar {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif; font-size: 0.95rem; font-weight: 700;
      color: var(--avatar-text); letter-spacing: 0; position: relative;
      border: 2px solid transparent;
    }
    .avatar-inner { position: relative; z-index: 1; }

    .entry-meta { flex: 1; min-width: 0; }
    .entry-name { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; }
    .entry-time { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.05em; margin-top: 0.15rem; }
    .entry-message { font-size: 0.82rem; line-height: 1.65; color: var(--ink); opacity: 0.85; margin-left: 3.15rem; }

    .entry-footer { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.8rem; margin-left: 3.15rem; }

    .like-btn {
      display: flex; align-items: center; gap: 0.35rem; background: none;
      border: 1px solid var(--border); border-radius: 20px; padding: 0.25rem 0.65rem;
      font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted);
      cursor: pointer; transition: all 0.15s; letter-spacing: 0.05em;
    }
    .like-btn:hover { border-color: var(--rust); color: var(--rust); }
    .like-btn.liked { background: var(--pin-bg); border-color: var(--rust); color: var(--rust); }
    .like-btn .heart { font-size: 0.8rem; }

    .pin-btn {
      display: flex; align-items: center; gap: 0.35rem; background: none;
      border: 1px solid var(--border); border-radius: 20px; padding: 0.25rem 0.6rem;
      font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted);
      cursor: pointer; transition: all 0.15s; letter-spacing: 0.05em;
    }
    .pin-btn:hover { border-color: var(--gold); color: var(--gold); }
    .pin-btn.pinned { background: var(--pin-bg); border-color: var(--pin-border); color: var(--gold); }

    mark { background: rgba(200,146,42,0.25); color: inherit; border-radius: 2px; padding: 0 1px; }

    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .empty-state .big { font-size: 2.5rem; margin-bottom: 0.8rem; }
    .empty-state p { font-size: 0.78rem; }
    .loading-state { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.78rem; letter-spacing: 0.05em; }

    footer { text-align: center; margin-top: 4rem; font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }

    @media(max-width:480px) {
      .stats-bar{gap:1rem} .stat-num{font-size:1.4rem}
      .top-bar{justify-content:center}
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- Top bar: theme switcher + dark mode -->
  <div class="top-bar">
    <span class="theme-label">Theme</span>
    <div class="swatches">
      <div class="swatch active" data-t="parchment" title="Parchment"></div>
      <div class="swatch" data-t="forest" title="Forest"></div>
      <div class="swatch" data-t="ocean" title="Ocean"></div>
      <div class="swatch" data-t="rose" title="Rose"></div>
      <div class="swatch" data-t="dark" title="Dark"></div>
    </div>
    <button class="dark-toggle" id="dark-toggle">
      <span class="toggle-icon">🌙</span>
      <span id="toggle-label">Dark</span>
    </button>
  </div>

  <header>
    <h1>The <em>Guestbook</em></h1>
    <p class="subtitle">Leave a note for the world to see</p>
  </header>

  <div class="stats-bar">
    <div class="stat"><span class="stat-num" id="stat-total">—</span><span class="stat-label">Total entries</span></div>
    <div class="stat"><span class="stat-num" id="stat-today">—</span><span class="stat-label">Today</span></div>
    <div class="stat"><span class="stat-num" id="stat-likes">—</span><span class="stat-label">Total likes</span></div>
  </div>

  <div class="form-card">
    <h2>Write an entry</h2>
    <div class="field">
      <label for="name">Your name</label>
      <input type="text" id="name" placeholder="e.g. Ada Lovelace" maxlength="60" autocomplete="off" />
    </div>
    <div class="field">
      <label>Your mood</label>
      <div class="mood-picker" id="mood-picker">
        <button class="mood-btn selected" data-mood="✨">✨</button>
        <button class="mood-btn" data-mood="😊">😊</button>
        <button class="mood-btn" data-mood="🎉">🎉</button>
        <button class="mood-btn" data-mood="💭">💭</button>
        <button class="mood-btn" data-mood="🌙">🌙</button>
        <button class="mood-btn" data-mood="🔥">🔥</button>
        <button class="mood-btn" data-mood="💙">💙</button>
        <button class="mood-btn" data-mood="🌿">🌿</button>
        <button class="mood-btn" data-mood="👋">👋</button>
        <button class="mood-btn" data-mood="🤔">🤔</button>
      </div>
    </div>
    <div class="field">
      <label for="message">Your message</label>
      <textarea id="message" placeholder="Say something kind, curious, or memorable…" maxlength="300"></textarea>
      <div class="char-count"><span id="char-num">0</span> / 300</div>
    </div>
    <button type="submit" id="submit-btn">
      <span class="spinner"></span>
      <span id="btn-text">Sign the book</span>
    </button>
    <div class="toast" id="toast"></div>
  </div>

  <div class="entries-header">
    <h2>Entries</h2>
    <span class="count-badge"><span class="live-dot"></span>Live · <span id="entry-count">—</span> notes</span>
  </div>

  <div class="search-bar">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Search by name or message…" />
  </div>

  <div class="sort-tabs">
    <button class="sort-tab active" data-sort="newest">Newest</button>
    <button class="sort-tab" data-sort="oldest">Oldest</button>
    <button class="sort-tab" data-sort="popular">Most liked</button>
    <button class="sort-tab" data-sort="pinned">📌 Pinned</button>
  </div>

  <div id="entries-list"><div class="loading-state">Loading entries…</div></div>

  <footer>Built with ✦ Supabase &amp; hosted on GitHub Pages</footer>
</div>

<script>
  const EDGE_FN  = 'https://cwvjswcqxsdhsbbbhpyo.supabase.co/functions/v1/guestbook';
  const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3dmpzd2NxeHNkaHNiYmJocHlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjg1OTAsImV4cCI6MjA4ODc0NDU5MH0.L7vQpgdJNwQTbURUx8TfHVxJuOs47NvdNUdwLca_Ynk';
  const AUTH     = { 'Authorization': 'Bearer ' + ANON_KEY };

  const nameEl   = document.getElementById('name');
  const msgEl    = document.getElementById('message');
  const submitBtn= document.getElementById('submit-btn');
  const btnText  = document.getElementById('btn-text');
  const toast    = document.getElementById('toast');
  const list     = document.getElementById('entries-list');
  const countEl  = document.getElementById('entry-count');
  const charNum  = document.getElementById('char-num');
  const searchEl = document.getElementById('search');

  let allEntries   = [];
  let sortMode     = 'newest';
  let selectedMood = '✨';
  let likedIds     = JSON.parse(localStorage.getItem('gb_likes') || '[]');
  let pinnedIds    = JSON.parse(localStorage.getItem('gb_pins') || '[]');

  // ── THEME ──
  const savedTheme = localStorage.getItem('gb_theme') || 'parchment';
  let isDark = savedTheme === 'dark';
  applyTheme(savedTheme);

  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('gb_theme', t);
    isDark = t === 'dark';
    document.getElementById('toggle-label').textContent = isDark ? 'Light' : 'Dark';
    document.querySelector('.toggle-icon').textContent = isDark ? '☀️' : '🌙';
    document.querySelectorAll('.swatch').forEach(s => s.classList.toggle('active', s.dataset.t === t));
  }

  document.querySelectorAll('.swatch').forEach(sw => {
    sw.addEventListener('click', () => applyTheme(sw.dataset.t));
  });

  document.getElementById('dark-toggle').addEventListener('click', () => {
    applyTheme(isDark ? 'parchment' : 'dark');
  });

  // ── MOOD ──
  document.getElementById('mood-picker').addEventListener('click', e => {
    const btn = e.target.closest('.mood-btn');
    if (!btn) return;
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedMood = btn.dataset.mood;
  });

  msgEl.addEventListener('input', () => { charNum.textContent = msgEl.value.length; });

  // ── SORT ──
  document.querySelectorAll('.sort-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.sort-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      sortMode = tab.dataset.sort;
      renderFiltered();
    });
  });

  searchEl.addEventListener('input', renderFiltered);

  // ── AVATAR ──
  const AVATAR_COLORS = [
    ['#b5451b','#1a1208'],['#2a5aaa','#eef2f8'],['#4a7c3f','#f0f4ee'],
    ['#c04060','#fdf0f4'],['#7a5aaa','#f4f0fd'],['#c8922a','#1a1208'],
    ['#2a9a8a','#eefaf8'],['#8a4a2a','#fdf4ee'],
  ];
  function getAvatar(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    const [bg, fg] = AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
    const initials = name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0,2);
    return { bg, fg, initials };
  }

  // ── HELPERS ──
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const hi  = (str, q) => !q ? esc(str) : esc(str).replace(new RegExp('('+esc(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');

  function timeAgo(d) {
    const s = Math.floor((Date.now()-new Date(d))/1000);
    if (s<60) return 'just now';
    if (s<3600) return Math.floor(s/60)+'m ago';
    if (s<86400) return Math.floor(s/3600)+'h ago';
    if (s<604800) return Math.floor(s/86400)+'d ago';
    return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  }

  function showToast(msg, type) {
    toast.textContent = msg; toast.className = 'toast '+type;
    setTimeout(() => { toast.className = 'toast'; }, 4000);
  }

  function updateStats(entries) {
    const today = new Date().toDateString();
    document.getElementById('stat-total').textContent = entries.length;
    document.getElementById('stat-today').textContent = entries.filter(e => new Date(e.created_at).toDateString()===today).length;
    document.getElementById('stat-likes').textContent = entries.reduce((s,e)=>s+(e.likes||0),0);
    countEl.textContent = entries.length;
  }

  function renderFiltered() {
    const q = searchEl.value.trim().toLowerCase();
    let entries = allEntries.filter(e => !q || e.name.toLowerCase().includes(q) || e.message.toLowerCase().includes(q));

    if (sortMode==='newest')  entries.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
    if (sortMode==='oldest')  entries.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    if (sortMode==='popular') entries.sort((a,b)=>(b.likes||0)-(a.likes||0));
    if (sortMode==='pinned')  entries = entries.filter(e => e.pinned || pinnedIds.includes(e.id));

    // Always show pinned on top for other sorts
    if (sortMode !== 'pinned') {
      entries.sort((a,b) => {
        const ap = a.pinned || pinnedIds.includes(a.id) ? 1 : 0;
        const bp = b.pinned || pinnedIds.includes(b.id) ? 1 : 0;
        return bp - ap;
      });
    }

    list.innerHTML = '';
    if (!entries.length) {
      list.innerHTML = sortMode==='pinned'
        ? `<div class="empty-state"><div class="big">📌</div><p>No pinned entries yet.</p></div>`
        : q
          ? `<div class="empty-state"><div class="big">🔍</div><p>No entries match "<strong>${esc(q)}</strong>"</p></div>`
          : `<div class="empty-state"><div class="big">✦</div><p>No entries yet — be the first to sign!</p></div>`;
      return;
    }

    entries.forEach(e => {
      const liked  = likedIds.includes(e.id);
      const isPinned = e.pinned || pinnedIds.includes(e.id);
      const { bg, fg, initials } = getAvatar(e.name);
      const card = document.createElement('div');
      card.className = 'entry-card' + (isPinned ? ' pinned-card' : '');
      card.dataset.id = e.id;
      card.innerHTML = `
        ${isPinned ? `<div class="pin-banner">📌 Featured entry</div>` : ''}
        <div class="entry-top">
          <div class="avatar" style="background:${bg}; color:${fg}">
            <span class="avatar-inner">${initials || '?'}</span>
          </div>
          <div class="entry-meta">
            <div class="entry-name">${hi(e.name,q)}</div>
            <div class="entry-time">${esc(e.mood||'✨')} · ${timeAgo(e.created_at)}</div>
          </div>
        </div>
        <div class="entry-message">${hi(e.message,q)}</div>
        <div class="entry-footer">
          <button class="like-btn${liked?' liked':''}" data-id="${e.id}" data-action="like">
            <span class="heart">${liked?'❤️':'🤍'}</span>
            <span class="like-count">${e.likes||0}</span>
          </button>
          <button class="pin-btn${isPinned?' pinned':''}" data-id="${e.id}" data-action="pin" title="${isPinned?'Unpin':'Pin this entry'}">
            ${isPinned?'📌':'📍'} ${isPinned?'Unpin':'Pin'}
          </button>
        </div>`;
      list.appendChild(card);
    });
  }

  // ── LIKE & PIN delegation ──
  list.addEventListener('click', async e => {
    const likeBtn = e.target.closest('.like-btn');
    const pinBtn  = e.target.closest('.pin-btn');

    if (likeBtn) {
      const id = likeBtn.dataset.id;
      if (likedIds.includes(id)) return;
      likedIds.push(id);
      localStorage.setItem('gb_likes', JSON.stringify(likedIds));
      const entry = allEntries.find(x=>x.id===id);
      if (entry) {
        entry.likes = (entry.likes||0)+1;
        likeBtn.classList.add('liked');
        likeBtn.querySelector('.heart').textContent = '❤️';
        likeBtn.querySelector('.like-count').textContent = entry.likes;
        updateStats(allEntries);
      }
      try { await fetch(`${EDGE_FN}?id=${id}`, { method:'PATCH', headers:AUTH }); } catch(_){}
    }

    if (pinBtn) {
      const id = pinBtn.dataset.id;
      const entry = allEntries.find(x=>x.id===id);
      if (!entry) return;

      // Optimistic toggle
      const wasLocal = pinnedIds.includes(id);
      if (wasLocal) {
        pinnedIds = pinnedIds.filter(x=>x!==id);
      } else {
        pinnedIds.push(id);
      }
      localStorage.setItem('gb_pins', JSON.stringify(pinnedIds));
      // Also update server
      try {
        const res = await fetch(`${EDGE_FN}?id=${id}&action=pin`, { method:'PATCH', headers:AUTH });
        const data = await res.json();
        if (data.pinned !== undefined) entry.pinned = data.pinned;
      } catch(_){}
      renderFiltered();
    }
  });

  // ── LOAD ──
  async function loadEntries() {
    try {
      const res = await fetch(EDGE_FN, { headers: AUTH });
      if (!res.ok) throw new Error();
      allEntries = await res.json();
      updateStats(allEntries);
      renderFiltered();
    } catch {
      if (!allEntries.length) list.innerHTML = `<div class="empty-state"><p>Could not load entries.</p></div>`;
    }
  }

  // ── SUBMIT ──
  submitBtn.addEventListener('click', async () => {
    const name = nameEl.value.trim(), message = msgEl.value.trim();
    if (!name||!message) { showToast('Please fill in your name and message.','error'); return; }
    submitBtn.disabled=true; submitBtn.classList.add('loading'); btnText.textContent='Signing…';
    try {
      const res = await fetch(EDGE_FN, {
        method:'POST', headers:{...AUTH,'Content-Type':'application/json'},
        body: JSON.stringify({name, message, mood:selectedMood})
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      nameEl.value=''; msgEl.value=''; charNum.textContent='0';
      showToast('Your entry was added! ✦','success');
      loadEntries();
    } catch { showToast('Something went wrong. Please try again.','error'); }
    finally { submitBtn.disabled=false; submitBtn.classList.remove('loading'); btnText.textContent='Sign the book'; }
  });

  nameEl.addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();submitBtn.click();} });
  setInterval(loadEntries, 10000);
  loadEntries();
</script>
</body>
</html>
